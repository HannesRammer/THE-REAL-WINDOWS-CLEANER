name: Build

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CleanWizard.sln

      - name: Build
        run: dotnet build CleanWizard.sln --configuration Release --no-restore
