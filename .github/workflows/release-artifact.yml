name: Release Artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CleanWizard.sln

      - name: Publish WPF App (win-x64)
        run: >
          dotnet publish .\src\CleanWizard.App\CleanWizard.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          --output .\artifacts\publish\win-x64

      - name: Zip Artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\release | Out-Null
          $zipPath = Join-Path (Resolve-Path .\artifacts\release) 'THE-REAL-WINDOWS-CLEANER-win-x64.zip'
          Compress-Archive -Path .\artifacts\publish\win-x64\* -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          $shaPath = "$zipPath.sha256"
          Set-Content -Path $shaPath -Value "$hash  $(Split-Path -Leaf $zipPath)" -Encoding ascii

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: THE-REAL-WINDOWS-CLEANER-win-x64-assets
          path: |
            .\artifacts\release\THE-REAL-WINDOWS-CLEANER-win-x64.zip
            .\artifacts\release\THE-REAL-WINDOWS-CLEANER-win-x64.zip.sha256

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" `
            .\artifacts\release\THE-REAL-WINDOWS-CLEANER-win-x64.zip `
            .\artifacts\release\THE-REAL-WINDOWS-CLEANER-win-x64.zip.sha256 `
            --clobber
